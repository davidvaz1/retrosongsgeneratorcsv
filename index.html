<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Visible Fix</title>
    <style>
        /* Minimalist, high-contrast styles to ensure visibility */
        body { background: #121212; color: #ffffff; font-family: sans-serif; padding: 20px; }
        
        .controls { 
            background: #181818; padding: 20px; border-radius: 8px; 
            max-width: 500px; margin: 0 auto 30px; border: 2px solid #333;
        }
        input { width: 90%; padding: 10px; margin: 10px 0; display: block; }
        
        /* FORCED GRID VISIBILITY */
        #grid { 
            display: block !important; /* Changed from grid to block for maximum compatibility */
            width: 100% !important;
            min-height: 500px;
            border: 1px dashed #444; /* Debug border: if you see this, the container is there */
        }

        .card { 
            background: #282828; 
            margin: 15px; 
            padding: 15px; 
            border-radius: 8px;
            display: flex; /* Horizontal layout is harder to "hide" than a grid */
            align-items: center;
            border-left: 5px solid #1DB954;
        }
        .card img { width: 80px; height: 80px; margin-right: 20px; border-radius: 4px; background: #000; }
        .info { flex-grow: 1; }
        .info b { font-size: 1.2rem; display: block; margin-bottom: 4px; color: #fff; }
        .info span { color: #b3b3b3; font-size: 0.9rem; }
        
        .link-btn { 
            background: #1DB954; color: white; text-decoration: none; 
            padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.8rem;
        }
        #status { color: #1DB954; font-weight: bold; text-align: center; display: block; margin: 10px; }
    </style>
</head>
<body>

    <div class="controls">
        <h2 style="margin:0">Spotify Global 100</h2>
        <input type="text" id="id" placeholder="Client ID">
        <input type="password" id="secret" placeholder="Client Secret">
        <button onclick="run()" style="width:100%; padding:15px; background:#1DB954; color:white; border:none; font-weight:bold; cursor:pointer;">GENERATE LIST</button>
        <span id="status">Ready</span>
    </div>

    <div id="grid"></div>

    <script>
        async function run() {
            const id = document.getElementById('id').value.trim();
            const secret = document.getElementById('secret').value.trim();
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if(!id || !secret) return alert("Enter keys!");
            
            grid.innerHTML = "<h3 style='text-align:center'>Clearing grid and starting injection...</h3>";
            status.innerText = "Authenticating...";

            try {
                // 1. Auth
                const auth = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + btoa(id + ':' + secret), 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await auth.json();

                // 2. Fetch 100 songs in 5 batches
                grid.innerHTML = ""; // Clear for real cards
                
                for (let i = 0; i < 5; i++) {
                    status.innerText = `Drawing Cards: ${ (i+1)*20 }/100`;
                    
                    const res = await fetch(`https://api.spotify.com/v1/search?q=top+hits+2026&type=track&limit=20&offset=${i*20}&market=US`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    const data = await res.json();

                    if(data.tracks && data.tracks.items) {
                        data.tracks.items.forEach(track => {
                            // Manual Creation to avoid innerHTML string issues
                            const card = document.createElement('div');
                            card.className = 'card';
                            
                            const img = track.album?.images[0]?.url || 'https://via.placeholder.com/80';
                            
                            card.innerHTML = `
                                <img src="${img}">
                                <div class="info">
                                    <b>${track.name}</b>
                                    <span>${track.artists[0].name} • ${track.album.name}</span><br>
                                    <small style="color:#666">Popularity: ${track.popularity}% | Released: ${track.album.release_date}</small>
                                </div>
                                <a href="${track.external_urls.spotify}" target="_blank" class="link-btn">LISTEN</a>
                            `;
                            grid.appendChild(card);
                        });
                    }
                }
                status.innerText = "FINISH: 100 items added to the page.";
            } catch (e) {
                status.innerText = "FATAL ERROR: " + e.message;
                console.error(e);
            }
        }
    </script>
</body>
</html>
