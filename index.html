<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Glassmorphism Edition</title>
    <style>
        :root {
            --accent: #1DB954;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
        }

        body { 
            background: #0b0e14; color: var(--text-main); font-family: 'Inter', sans-serif; 
            margin: 0; padding: 20px; overflow-x: hidden; min-height: 100vh;
        }

        /* DYNAMIC FLOATING BACKGROUND */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; filter: blur(40px); opacity: 0.6;
        }

        .header {
            max-width: 600px; margin: 40px auto; text-align: center;
            background: var(--glass-bg); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 24px; border: 1px solid var(--glass-border);
        }

        .auth-grid { display: flex; flex-direction: column; gap: 12px; margin: 20px 0; }
        
        input { 
            padding: 14px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.4); color: white; font-size: 14px;
        }

        /* GRID & ALIGNMENT FIX */
        #grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1400px; margin: 0 auto; 
        }

        .card { 
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border-radius: 20px; border: 1px solid var(--glass-border);
            overflow: hidden; display: flex; flex-direction: column;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }

        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        
        .card-body { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .song-title { font-weight: 800; font-size: 1.1rem; margin-bottom: 5px; height: 2.6em; overflow: hidden; }
        .artist-name { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-bottom: 15px; }
        
        .meta-group { font-size: 0.8rem; color: var(--text-dim); flex-grow: 1; margin-bottom: 20px; }
        .meta-line { display: flex; justify-content: space-between; margin-bottom: 6px; }

        .btn-spotify { 
            background: var(--accent); color: white; text-decoration: none; 
            text-align: center; padding: 12px; border-radius: 12px; 
            font-weight: 700; font-size: 0.9rem;
        }

        .generate-btn {
            background: var(--accent); color: white; border: none; padding: 18px 40px;
            border-radius: 50px; font-weight: 800; cursor: pointer; transition: 0.2s;
        }
        .generate-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(29, 185, 84, 0.4); }

        #status { margin-top: 15px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

    <div id="bg-canvas"></div>

    <div class="header">
        <h1>Global 100 Explorer</h1>
        <div class="auth-grid">
            <input type="text" id="clientId" placeholder="Spotify Client ID">
            <input type="password" id="clientSecret" placeholder="Spotify Client Secret">
        </div>
        <button class="generate-btn" id="btn" onclick="runExplorer()">FETCH GLOBAL 100</button>
        <div id="status">Ready</div>
    </div>

    <div id="grid"></div>

    <script>
        // 1. RANDOM FLOATING BACKGROUND ENGINE
        function createBackground() {
            const canvas = document.getElementById('bg-canvas');
            const colors = ['#ff0080', '#7928ca', '#1DB954', '#00f2fe', '#4facfe', '#ff4d4d'];
            for(let i = 0; i < 15; i++) {
                const blob = document.createElement('div');
                const size = Math.random() * 400 + 200;
                blob.style.cssText = `
                    position: absolute;
                    width: ${size}px; height: ${size}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    border-radius: 50%;
                    top: ${Math.random() * 100}%; left: ${Math.random() * 100}%;
                    animation: float ${Math.random() * 20 + 10}s infinite linear alternate;
                `;
                canvas.appendChild(blob);
            }
        }
        
        // Add CSS Animation dynamically
        const style = document.createElement('style');
        style.innerHTML = `@keyframes float { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }`;
        document.head.appendChild(style);
        createBackground();

        async function runExplorer() {
            const id = document.getElementById('clientId').value;
            const secret = document.getElementById('clientSecret').value;
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if (!id || !secret) return alert("Enter credentials!");
            grid.innerHTML = "";
            let tracks = [];

            try {
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await authRes.json();

                // Fetching in batches of 20 for better market filtering
                for (let i = 0; i < 5; i++) {
                    status.innerText = `Fetching Global Hits: ${(i+1)*20}%`;
                    
                    // Locked to US market to prevent regional Hindi trends as requested
                    const res = await fetch(`https://api.spotify.com/v1/search?q=top+100+global+2026&type=track&limit=20&offset=${i*20}&market=US`, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    const data = await res.json();
                    if (data?.tracks?.items) {
                        tracks = [...tracks, ...data.tracks.items];
                        render(tracks);
                    }
                }
                status.innerText = "100 Global Tracks Synchronized.";
            } catch (e) { status.innerText = "Error: " + e.message; }
        }

        function render(tracks) {
            const grid = document.getElementById('grid');
            grid.innerHTML = tracks.map(t => `
                <div class="card">
                    <img src="${t.album.images[0]?.url || ''}">
                    <div class="card-body">
                        <div class="song-title">${t.name}</div>
                        <div class="artist-name">${t.artists[0].name}</div>
                        <div class="meta-group">
                            <div class="meta-line"><span>Album</span> <span>${t.album.name.slice(0,15)}..</span></div>
                            <div class="meta-line"><span>Released</span> <span>${t.album.release_date}</span></div>
                            <div class="meta-line"><span>Popularity</span> <span>${t.popularity}%</span></div>
                        </div>
                        <a href="${t.external_urls.spotify}" target="_blank" class="btn-spotify">LISTEN ON SPOTIFY</a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
