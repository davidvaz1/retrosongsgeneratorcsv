<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Explorer - FIXED RENDER</title>
    <style>
        :root {
            --bg: #121212; --text: #ffffff; --card: #181818; --border: #282828; --accent: #1DB954;
        }
        body.light {
            --bg: #ffffff; --text: #121212; --card: #f4f4f4; --border: #dddddd; --accent: #1aa34a;
        }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; padding: 20px; text-align: center; }
        
        /* The Grid Fix */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            max-width: 1100px; 
            margin: 40px auto;
            min-height: 500px; /* Forces space to be visible */
        }

        .card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            padding: 12px; 
            border-radius: 12px; 
            text-align: left;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { 
            width: 100%; 
            aspect-ratio: 1/1; 
            border-radius: 8px; 
            object-fit: cover; 
            background: #333; /* Visual placeholder */
        }
        .song-info { margin-top: 10px; }
        .song-name { font-weight: bold; font-size: 0.9rem; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .artist-name { color: #888; font-size: 0.8rem; }

        button { background: var(--accent); color: white; border: none; padding: 14px 28px; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        button:disabled { background: #444; opacity: 0.7; }
        .toggle-btn { background: #555; font-size: 0.8rem; margin-bottom: 20px; }
        #status { margin-top: 15px; font-weight: bold; color: var(--accent); min-height: 1.2em; }
    </style>
</head>
<body class="dark">

    <button class="toggle-btn" onclick="document.body.classList.toggle('light')">Toggle Light Mode</button>
    <h1>Spotify Explorer</h1>
    <p>Loading 100 tracks in batches of 10 (Feb 2026 API Compliant)</p>
    
    <button id="main-btn" onclick="startGeneration()">GENERATE 100 SONGS</button>
    <div id="status">Ready</div>
    
    <div id="grid"></div>

    <script>
        const CLIENT_ID = 'YOUR_CLIENT_ID';
        const CLIENT_SECRET = 'YOUR_CLIENT_SECRET';

        async function startGeneration() {
            const btn = document.getElementById('main-btn');
            const grid = document.getElementById('grid');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            grid.innerHTML = "";
            let allTracks = [];

            try {
                // 1. Authenticate
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await authRes.json();

                // 2. Paginated Loop (10 pages of 10)
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Fetching: ${ (i + 1) * 10 } / 100 songs...`;
                    
                    const url = `https://api.spotify.com/v1/search?q=year:2026&type=track&limit=10&offset=${i * 10}`;
                    
                    const res = await fetch(url, {
                        headers: { 'Authorization': 'Bearer ' + access_token }
                    });
                    
                    const data = await res.json();
                    if (data.tracks && data.tracks.items) {
                        allTracks = [...allTracks, ...data.tracks.items];
                        // Render progress to the screen immediately
                        updateGrid(allTracks);
                    }
                    // Prevent UI freezing
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                status.innerText = "100 Songs Loaded Successfully.";
                console.log("Total songs in array:", allTracks.length);

            } catch (e) {
                status.innerText = "Error: " + e.message;
                console.error("Fetch Error:", e);
            } finally {
                btn.disabled = false;
            }
        }

        function updateGrid(tracks) {
            const grid = document.getElementById('grid');
            const html = tracks.map(t => {
                const img = t.album.images[0]?.url || 'https://via.placeholder.com/200';
                return `
                    <div class="card">
                        <img src="${img}" loading="lazy">
                        <div class="song-info">
                            <div class="song-name">${t.name}</div>
                            <div class="artist-name">${t.artists[0].name}</div>
                        </div>
                    </div>
                `;
            }).join('');
            
            grid.innerHTML = html;
        }
    </script>
</body>
</html>
