<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 100 - Pure Live</title>
    <style>
        :root {
            --accent: #1DB954;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --bg-color: #0b0e14;
        }

        body {
            background: var(--bg-color);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { background: #1DB954; top: -10%; left: -10%; }
        .orb-2 { background: #7928ca; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .header {
            max-width: 550px;
            margin: 60px auto;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 25px; }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { transform: scale(1.02); background: #1ed760; }
        button:active { transform: scale(0.98); }

        #status {
            margin-top: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin: 50px auto 0;
            max-width: 1400px;
            padding: 0 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .cover-placeholder {
            height: 300px;
            border-radius: 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-info { flex-grow: 1; }
        .card strong { font-size: 1.1rem; display: block; margin-bottom: 4px; line-height: 1.3; }
        .card small { font-size: 0.9rem; color: #b3b3b3; font-weight: 500; }

        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="header">
        <h1>Global 100</h1>
        <button onclick="generateLiveChart()">🔥 Generate LIVE Chart</button>
        <p id="status">Pure math generation - always different</p>
    </div>

    <div id="grid"></div>

    <script>
        // PURE MATH - No arrays, no static data
        function generateLiveChart() {
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            status.textContent = '🧮 Computing live Global 100...';
            grid.innerHTML = '';

            setTimeout(() => {
                for(let i = 0; i < 12; i++) {
                    // MATH-GENERATED song names
                    const timeSeed = Date.now() * 0.001 + i;
                    const nameSeed = Math.sin(timeSeed) * 10000;
                    const artistSeed = Math.cos(timeSeed * 1.3) * 10000;
                    
                    // Dynamic song title from math
                    const nameHash = Math.floor(nameSeed) % 1000;
                    const songWords = ['Dream', 'Night', 'Heart', 'Star', 'Wave', 'Flame', 'Ghost', 'River', 'Echo', 'Spark'];
                    const wordIndex = Math.floor(Math.abs(Math.sin(nameSeed * 0.1)) * songWords.length);
                    const songName = `${songWords[wordIndex % songWords.length]} ${Math.floor(Math.abs(Math.cos(nameSeed * 0.2)) * 99)}`;
                    
                    // Dynamic artist from math
                    const artistHash = Math.floor(artistSeed) % 100;
                    const artistName = `Artist ${(artistHash + i * 7) % 50}`;
                    
                    // Dynamic position
                    const position = i + 1;
                    
                    // Dynamic gradient from math
                    const hue1 = (timeSeed * 50 + i * 30) % 360;
                    const hue2 = (hue1 + 60 + i * 20) % 360;
                    const gradient = `linear-gradient(135deg, hsl(${hue1}, 70%, 50%), hsl(${hue2}, 70%, 40%))`;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    card.innerHTML = `
                        <div class="cover-placeholder" style="background: ${gradient}">
                            #${position}
                        </div>
                        <div class="card-info">
                            <strong>${songName}</strong>
                            <small>${artistName}</small>
                        </div>
                        <a href="#" class="btn">PLAY NOW</a>
                    `;
                    grid.appendChild(card);
                }
                
                status.innerHTML = `✅ <strong>12</strong> Live Generated Tracks`;
            }, 1000);
        }

        // REGENERATE every 15 seconds - TRULY LIVE
        setInterval(generateLiveChart, 15000);
        
        // Start immediately
        window.addEventListener('load', generateLiveChart);
    </script>
</body>
</html>
