<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 100 - Live Spotify</title>
    <style>
        .glass-dynamic {
  background: rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
  box-shadow: 
    0 8px 32px rgba(31, 38, 135, 0.37),
    inset 0 1px 0 rgba(255, 255, 255, 0.3);
  transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.glass-1 { background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.4); }
.glass-2 { background: rgba(16, 185, 129, 0.15); border: 1px solid rgba(16, 185, 129, 0.4); }
.glass-3 { background: rgba(245, 158, 11, 0.15); border: 1px solid rgba(245, 158, 11, 0.4); }
.glass-4 { background: rgba(236, 72, 153, 0.15); border: 1px solid rgba(236, 72, 153, 0.4); }
.glass-5 { background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.4); }

.glass-hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 
    0 25px 50px rgba(31, 38, 135, 0.5),
    inset 0 1px 0 rgba(255, 255, 255, 0.6);
}

        :root {
    --accent: #1DB954;
    --glass-light: rgba(255, 255, 255, 0.08);
    --glass-border-light: rgba(255, 255, 255, 0.18);
    --glass-border-hover: rgba(255, 255, 255, 0.35);
    --bg-color: #0b0e14;
    --shadow-sm: 0 8px 32px rgba(0, 0, 0, 0.1);
    --shadow-md: 0 20px 60px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 25px 80px -15px rgba(29, 185, 84, 0.2);
}

body {
    background: var(--bg-color);
    color: white;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    margin: 0;
    padding: 20px;
    min-height: 100vh;
    overflow-x: hidden;
}

.orb {
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(100px);
    z-index: -1;
    opacity: 0.35;
    animation: float 20s infinite alternate ease-in-out;
}

.orb-1 {
    background: #1DB954;
    top: -10%;
    left: -10%;
}

.orb-2 {
    background: #7928ca;
    bottom: -10%;
    right: -10%;
    animation-delay: -5s;
}

@keyframes float {
    0% { transform: translate(0, 0); }
    100% { transform: translate(100px, 50px); }
}

.header {
    max-width: 550px;
    margin: 60px auto;
    text-align: center;
    background: linear-gradient(135deg, var(--glass-light), rgba(255, 255, 255, 0.04));
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    padding: 40px;
    border-radius: 32px;
    border: 1.5px solid var(--glass-border-light);
    box-shadow: inset 0 2px 8px rgba(255, 255, 255, 0.08), var(--shadow-lg);
    position: relative;
    overflow: hidden;
}

.header::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: radial-gradient(circle at 30% 30%, rgba(29, 185, 84, 0.1), transparent 50%);
    pointer-events: none;
}

h1 {
    font-size: 2.5rem;
    letter-spacing: -1.5px;
    margin-bottom: 25px;
    position: relative;
    z-index: 1;
}

button {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), #16a34a);
    color: #000;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50px;
    cursor: pointer;
    font-weight: 800;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 10px 30px rgba(29, 185, 84, 0.3);
    position: relative;
    z-index: 1;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    background: linear-gradient(135deg, #1ed760, #20b74f);
    box-shadow: 0 15px 40px rgba(29, 185, 84, 0.4);
}

button:active {
    transform: translateY(0) scale(0.98);
}

#status {
    margin-top: 20px;
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--accent);
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
}

#grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 30px;
    margin: 50px auto 0;
    max-width: 1400px;
    padding: 0 20px;
}

.card {
    background: linear-gradient(135deg, var(--glass-light), rgba(255, 255, 255, 0.03));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 20px;
    border: 1.5px solid var(--glass-border-light);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    display: flex;
    flex-direction: column;
    box-shadow: inset 0 1.5px 4px rgba(255, 255, 255, 0.06), var(--shadow-sm);
    position: relative;
    overflow: hidden;
}

.card::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(29, 185, 84, 0.08), transparent 70%);
    pointer-events: none;
}

.card:hover {
    transform: translateY(-12px);
    border-color: var(--glass-border-hover);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0.05));
    box-shadow: inset 0 1.5px 4px rgba(255, 255, 255, 0.1), var(--shadow-md);
}

.card img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 16px;
    margin-bottom: 18px;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
    position: relative;
    z-index: 1;
}

.card-info {
    flex-grow: 1;
    position: relative;
    z-index: 1;
}

.card strong {
    font-size: 1.1rem;
    display: block;
    margin-bottom: 4px;
    line-height: 1.3;
}

.card small {
    font-size: 0.9rem;
    color: #b3b3b3;
    font-weight: 500;
}

.btn {
    display: block;
    background: linear-gradient(135deg, rgba(29, 185, 84, 0.2), rgba(121, 40, 202, 0.1));
    color: white;
    text-align: center;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: 700;
    margin-top: 20px;
    font-size: 0.85rem;
    border: 1.5px solid var(--glass-border-light);
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    z-index: 1;
    backdrop-filter: blur(10px);
}

.btn:hover {
    background: linear-gradient(135deg, rgba(29, 185, 84, 0.4), rgba(121, 40, 202, 0.2));
    border-color: var(--glass-border-hover);
    box-shadow: 0 8px 20px rgba(29, 185, 84, 0.25);
    transform: translateY(-2px);
}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="header">
        <h1>Global 100</h1>
        <button onclick="fetchSpotify()">🎵 Fetch Latest Releases</button>
        <p id="status">Loading live Spotify data...</p>
    </div>

    <div id="grid"></div>

<script>
async function fetchSpotify() {
    const status = document.getElementById('status');
    const grid = document.getElementById('grid');
    
    status.textContent = '🔄 Loading Spotify releases...';
    grid.innerHTML = '';

    try {
        const response = await fetch('/api/spotify');
        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        
        const data = await response.json();
        
        if (!data.albums || data.albums.length === 0) {
            throw new Error('No albums received from Spotify');
        }

        data.albums.forEach((album, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const imgUrl = album.images?.[0]?.url || '';
            const artistName = album.artists?.[0]?.name || 'Unknown Artist';
            const albumUrl = album.external_urls?.spotify || '#';
            
            card.innerHTML = `
                <img src="${imgUrl}" alt="${album.name}" loading="lazy" 
                     style="width:100%;height:300px;object-fit:cover;border-radius:16px;margin-bottom:18px;box-shadow:0 10px 20px rgba(0,0,0,0.3);"
                     onerror="this.style.display='none';this.parentNode.insertAdjacentHTML('afterbegin','<div style=\\"display:flex;align-items:center;justify-content:center;height:300px;background:linear-gradient(135deg,#1DB954,#7928ca);border-radius:16px;font-size:4rem\\">🎵</div>')">
                <div class="card-info">
                    <strong>${album.name}</strong>
                    <small>${artistName}</small>
                </div>
                <a href="${albumUrl}" target="_blank" class="btn">🎧 SPOTIFY</a>
            `;
            grid.appendChild(card);
        });

        status.innerHTML = `✅ <strong>${data.albums.length}</strong> New Releases Live!`;
    } catch (error) {
        status.textContent = `❌ ${error.message}`;
        console.error('Load error:', error);
    }
}

// Load immediately + auto-refresh every 10 minutes
fetchSpotify();
setInterval(fetchSpotify, 600000);
</script>

</body>
</html>
