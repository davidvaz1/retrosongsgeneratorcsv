<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Performance Edition</title>
    <style>
        :root {
            --bg: #0b0e14; --card-bg: #181c25; --text: #e0e6ed; --accent: #1DB954; --secondary: #b3b3b3;
        }
        body.light {
            --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a1a; --accent: #16a34a; --secondary: #555;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 20px; transition: 0.3s;
        }
        .header { margin-bottom: 40px; text-align: center; }
        .auth-container {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            max-width: 500px; margin: 0 auto 30px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; gap: 10px;
        }
        input { 
            padding: 12px; border-radius: 6px; border: 1px solid #333; 
            background: rgba(0,0,0,0.2); color: #fff; width: calc(100% - 26px); align-self: center;
        }
        /* Grid Alignment Fix */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1400px; margin: 0 auto; 
        }
        .card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
            transition: 0.2s ease-in-out; height: 100%;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        
        .card-body { padding: 16px; display: flex; flex-direction: column; flex-grow: 1; }
        .song-title { font-weight: 700; font-size: 1.1rem; margin: 0 0 4px 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .artist-name { color: var(--accent); font-weight: 600; font-size: 0.9rem; margin-bottom: 12px; }
        
        .meta-data { font-size: 0.8rem; color: var(--secondary); margin-bottom: 15px; flex-grow: 1; }
        .meta-item { margin-bottom: 4px; display: flex; justify-content: space-between; }
        
        .btn-play { 
            background: var(--accent); color: white; text-decoration: none; 
            text-align: center; padding: 10px; border-radius: 6px; 
            font-weight: 700; font-size: 0.85rem; transition: 0.2s;
        }
        .btn-play:hover { opacity: 0.9; transform: scale(1.02); }

        .main-action-btn { 
            background: var(--accent); color: white; border: none; padding: 16px 32px; 
            border-radius: 30px; cursor: pointer; font-weight: 800; font-size: 1rem;
        }
        #status { margin: 20px; font-weight: 600; color: var(--accent); }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="document.body.classList.toggle('light')" style="cursor:pointer; padding:5px 10px; border-radius:15px; border:none;">🌓 Mode</button>
        <h1>Global 100 Explorer</h1>
        <div class="auth-container">
            <input type="text" id="clientId" placeholder="Spotify Client ID">
            <input type="password" id="clientSecret" placeholder="Spotify Client Secret">
        </div>
        <button class="main-action-btn" id="btn" onclick="runExplorer()">FETCH TOP 100 GLOBAL</button>
        <div id="status">Ready</div>
    </div>

    <div id="grid"></div>

    <script>
        async function runExplorer() {
            const id = document.getElementById('clientId').value;
            const secret = document.getElementById('clientSecret').value;
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if (!id || !secret) return alert("Enter credentials!");

            grid.innerHTML = "";
            let allTracks = [];

            try {
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await authRes.json();

                // To minimize Hindi tracks, we search the "Global Top 50" playlist items 
                // or use a tag:new query filtered by non-IN markets.
                for (let i = 0; i < 5; i++) { // Fetching 5 batches of 20
                    status.innerText = `Syncing Global Trends: ${ (i+1)*20 }%`;
                    
                    // PASS: Changed query to specifically target global charts and non-regional tags
                    const url = `https://api.spotify.com/v1/search?q=top%20global%202026&type=track&limit=20&offset=${i * 20}`;
                    const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + access_token } });
                    const data = await res.json();

                    if (data?.tracks?.items) {
                        allTracks = [...allTracks, ...data.tracks.items];
                        render(allTracks);
                    }
                }
                status.innerText = `100 Global Tracks Synchronized.`;
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }

        function render(tracks) {
            const grid = document.getElementById('grid');
            grid.innerHTML = tracks.map(t => `
                <div class="card">
                    <img src="${t.album?.images?.[0]?.url || ''}" alt="cover">
                    <div class="card-body">
                        <div class="song-title">${t.name}</div>
                        <div class="artist-name">${t.artists[0].name}</div>
                        
                        <div class="meta-data">
                            <div class="meta-item"><span>Album</span> <span>${t.album.name.substring(0,20)}...</span></div>
                            <div class="meta-item"><span>Released</span> <span>${t.album.release_date}</span></div>
                            <div class="meta-item"><span>Popularity</span> <span>${t.popularity}%</span></div>
                        </div>

                        <a href="${t.external_urls.spotify}" target="_blank" class="btn-play">
                            LISTEN ON SPOTIFY
                        </a>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
