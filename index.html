<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 Explorer - 2026 Edition</title>
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #e0e6ed;
            --accent: #1DB954;
        }
        body.light {
            --bg: #f4f7f9;
            --card-bg: #ffffff;
            --text: #1a1a1a;
            --accent: #16a34a;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui; 
            margin: 0; padding: 40px 20px; transition: 0.3s;
        }
        .auth-container {
            background: var(--card-bg); padding: 25px; border-radius: 20px;
            max-width: 450px; margin: 0 auto 30px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }
        input { 
            width: 85%; padding: 12px; margin: 8px 0; border-radius: 10px; 
            border: 1px solid #333; background: rgba(0,0,0,0.3); color: #fff;
        }
        #grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px; max-width: 1300px; margin: 0 auto; 
        }
        .card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); transition: transform 0.3s, box-shadow 0.3s;
            text-align: left; position: relative;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-content { padding: 15px; }
        .song-title { font-weight: 800; font-size: 1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { color: var(--accent); font-weight: 600; font-size: 0.85rem; }
        .extra-info { font-size: 0.75rem; color: #888; margin-top: 10px; line-height: 1.4; }
        
        button { 
            background: var(--accent); color: white; border: none; padding: 15px 35px; 
            border-radius: 50px; cursor: pointer; font-weight: 800; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
        }
        #status { margin: 20px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <button onclick="document.body.classList.toggle('light')" style="background:#333; font-size:0.7rem; margin-bottom: 20px;">Toggle Theme</button>
    <h1>Global Chart Explorer</h1>

    <div class="auth-container">
        <input type="text" id="clientId" placeholder="Spotify Client ID">
        <input type="password" id="clientSecret" placeholder="Spotify Client Secret">
    </div>

    <button id="btn" onclick="runExplorer()">FETCH TOP 100 GLOBAL</button>
    <div id="status">Ready to sync...</div>
    <div id="grid"></div>

    <script>
        // Simple regex to detect Devanagari (Hindi) characters
        const isHindi = (str) => /[\u0900-\u097F]/.test(str);

        async function runExplorer() {
            const id = document.getElementById('clientId').value;
            const secret = document.getElementById('clientSecret').value;
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            
            if (!id || !secret) return alert("Enter credentials!");

            grid.innerHTML = "";
            status.style.color = "var(--accent)";
            let allTracks = [];

            try {
                // 1. Auth
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                if (!authRes.ok) throw new Error("Auth failed. Check IDs.");
                const { access_token } = await authRes.json();

                // 2. Fetching Loop (10 x 10 = 100)
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Filtering Global Charts: ${ (i+1)*10 }%`;
                    
                    // Using "tag:new" or "top global" to get actual popular tracks
                    const url = `https://api.spotify.com/v1/search?q=year:2026&type=track&limit=10&offset=${i * 10}`;
                    const res = await fetch(url, { headers: { 'Authorization': `Bearer ${access_token}` } });
                    const data = await res.json();

                    if (data?.tracks?.items) {
                        // Filter out Hindi songs based on character detection
                        const filteredBatch = data.tracks.items.filter(item => !isHindi(item.name) && !isHindi(item.artists[0].name));
                        allTracks = [...allTracks, ...filteredBatch];
                        render(allTracks);
                    }
                }
                status.innerText = `Final Count: ${allTracks.length} Global Tracks Displayed.`;
            } catch (e) {
                status.style.color = "#ff5555";
                status.innerText = e.message;
            }
        }

        function render(tracks) {
            const grid = document.getElementById('grid');
            grid.innerHTML = tracks.map(t => `
                <div class="card">
                    <img src="${t.album?.images?.[0]?.url || ''}" loading="lazy">
                    <div class="card-content">
                        <div class="song-title" title="${t.name}">${t.name}</div>
                        <div class="artist-name">${t.artists[0].name}</div>
                        <div class="extra-info">
                            <strong>Album:</strong> ${t.album.name}<br>
                            <strong>Released:</strong> ${t.album.release_date}<br>
                            <strong>Popularity:</strong> ${t.popularity}%
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
