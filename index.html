<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 - Access Restored</title>
    <style>
        :root { --accent: #1DB954; --glass: rgba(255, 255, 255, 0.1); }
        body { background: #0b0e14; color: white; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .header { 
            max-width: 500px; margin: 40px auto; text-align: center;
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
        }
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 40px; }
        .card { background: var(--glass); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .btn { display: block; background: var(--accent); color: #000; text-align: center; padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        #status { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Global 100</h1>
        <input type="text" id="id" placeholder="Client ID">
        <input type="password" id="secret" placeholder="Client Secret">
        <button onclick="run()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:30px; cursor:pointer; font-weight:bold;">FETCH NEW RELEASES</button>
        <p id="status">Standby</p>
    </div>

    <div id="grid"></div>

    <script>
        async function run() {
            const id = document.getElementById('id').value.trim();
            const secret = document.getElementById('secret').value.trim();
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');

            status.innerText = "Authenticating...";
            grid.innerHTML = "";

            try {
                // 1. Auth
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(id + ':' + secret),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                
                const authData = await authRes.json();
                if (!authRes.ok) throw new Error(authData.error_description || "Auth Error");

                // 2. Fetch New Releases (Most reliable 2026 endpoint)
                status.innerText = "Fetching Global New Releases...";
                const res = await fetch('https://api.spotify.com/v1/browse/new-releases?limit=50&country=US', {
                    headers: { 'Authorization': 'Bearer ' + authData.access_token }
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(`API Error ${res.status}: ${err.error.message}`);
                }

                const data = await res.json();
                data.albums.items.forEach(album => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${album.images[0].url}">
                        <strong>${album.name}</strong><br>
                        <small>${album.artists[0].name}</small>
                        <a href="${album.external_urls.spotify}" target="_blank" class="btn">VIEW ALBUM</a>
                    `;
                    grid.appendChild(card);
                });

                status.innerText = "Success: 50 New Releases Loaded.";
            } catch (e) {
                status.innerText = e.message;
            }
        }
    </script>
</body>
</html>
