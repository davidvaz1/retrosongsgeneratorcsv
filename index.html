<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spotify Explorer - Force Render</title>
    <style>
        :root { --bg: #121212; --text: #fff; --accent: #1DB954; }
        body.light { --bg: #ffffff; --text: #121212; --accent: #1aa34a; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; text-align: center; transition: 0.3s; }
        
        /* Fixed Container */
        #container { min-height: 100vh; width: 100%; display: block; position: relative; }
        
        #grid { 
            display: flex !important; 
            flex-wrap: wrap !important; 
            justify-content: center !important;
            gap: 20px; 
            margin-top: 30px;
            padding-bottom: 50px;
        }

        .card { 
            background: #282828; 
            color: white;
            width: 180px; 
            min-height: 250px;
            padding: 10px; 
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: block !important;
        }

        .card img { 
            width: 100%; 
            height: 180px; 
            background: #444; 
            border-radius: 4px; 
            object-fit: cover;
        }

        button { background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #status { margin: 20px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <button onclick="document.body.classList.toggle('light')">Toggle Light Mode</button>
    <h1>Spotify Explorer</h1>
    <button id="btn" onclick="start()">GENERATE 100 SONGS</button>
    <div id="status">Ready</div>
    
    <div id="container">
        <div id="grid"></div>
    </div>

    <script>
        const CLIENT_ID = 'YOUR_ID'; 
        const CLIENT_SECRET = 'YOUR_SECRET';

        async function start() {
            const grid = document.getElementById('grid');
            const status = document.getElementById('status');
            const btn = document.getElementById('btn');
            
            btn.disabled = true;
            grid.innerHTML = "";
            let allTracks = [];

            try {
                // 1. Auth
                const authRes = await fetch('https://accounts.spotify.com/api/token', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET),
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'grant_type=client_credentials'
                });
                const { access_token } = await authRes.json();

                // 2. Paginated Loop (10 requests of 10 songs)
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Fetching: ${ (i+1) * 10 }%`;
                    
                    // Fixed search endpoint for Feb 2026 limits
                    const url = `https://api.spotify.com/v1/search?q=year:2026&type=track&limit=10&offset=${i * 10}`;
                    
                    const res = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${access_token}` }
                    });
                    const data = await res.json();
                    
                    if (data.tracks?.items) {
                        allTracks = [...allTracks, ...data.tracks.items];
                        forceRender(allTracks); 
                    }
                    await new Promise(r => setTimeout(r, 100));
                }
                status.innerText = "Loaded 100 songs.";
            } catch (e) {
                status.innerText = "Error: " + e.message;
            } finally {
                btn.disabled = false;
            }
        }

        // Pass 10 Debug: Using a more aggressive rendering method
        function forceRender(items) {
            const grid = document.getElementById('grid');
            const fragment = document.createDocumentFragment();
            
            // Clear current grid
            grid.innerHTML = "";

            items.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const imgUrl = t.album.images[0]?.url || 'https://via.placeholder.com/180';
                
                card.innerHTML = `
                    <img src="${imgUrl}" onload="this.style.opacity=1" style="opacity:0.5; transition:0.3s;">
                    <div style="margin-top:8px; font-weight:bold; font-size:0.8rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${t.name}</div>
                    <div style="color:#bbb; font-size:0.7rem;">${t.artists[0].name}</div>
                `;
                fragment.appendChild(card);
            });
            
            grid.appendChild(fragment);
        }
    </script>
</body>
</html>
