<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 100 - Glassmorphism Edition</title>
    <link rel="icon" href="favicon.ico">
    <style>
        :root {
            --accent: #1DB954;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --bg-color: #0b0e14;
        }

        body {
            background: var(--bg-color);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Mesh Background Orbs */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { background: #1DB954; top: -10%; left: -10%; }
        .orb-2 { background: #7928ca; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .header {
            max-width: 550px;
            margin: 60px auto;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 25px; }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

        input {
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; background: rgba(0, 0, 0, 0.5); }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { transform: scale(1.02); background: #1ed760; }
        button:active { transform: scale(0.98); }

        #status {
            display: block;
            margin-top: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-info { flex-grow: 1; }
        .card strong { font-size: 1.1rem; display: block; margin-bottom: 4px; line-height: 1.3; }
        .card small { font-size: 0.9rem; color: #b3b3b3; font-weight: 500; }

        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="header">
        <h1>Global 100</h1>
        <div class="input-group">
            <input type="text" id="id" placeholder="Spotify Client ID">
            <input type="password" id="secret" placeholder="Spotify Client Secret">
        </div>
        <button onclick="run()">Fetch New Releases</button>
        <p id="status">Standby</p>
    </div>

    <div class="container" style="max-width: 1400px; margin: 0 auto;">
        <div id="grid"></div>
    </div>

<script>
async function fetchSpotifyData(id, secret) {
    // Priority 1: Netlify function (secure, if deployed)
    try {
        const res = await fetch('/.netlify/functions/spotify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ client_id: id, client_secret: secret })
        });
        if (res.ok) return await res.json();
    } catch (e) {}

    // Priority 2: Client-side with auth (allorigins + Client Credentials)
    try {
        const encoded = btoa(`${id}:${secret}`);
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(
            `https://accounts.spotify.com/api/token?grant_type=client_credentials`
        )}`;
        const tokenRes = await fetch(proxyUrl, {
            headers: { 'Authorization': `Basic ${encoded}` }
        });
        const tokenData = await tokenRes.json();
        const access_token = tokenData.access_token;

        const releasesProxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(
            `https://api.spotify.com/v1/browse/new-releases?limit=50&country=US`
        )}`;
        const releasesRes = await fetch(releasesProxy, {
            headers: { 'Authorization': `Bearer ${access_token}` }
        });
        const json = await releasesRes.json();
        return {
            albums: json.albums.items.map(item => ({
                name: item.name,
                artists: item.artists,
                images: item.images,
                external_urls: item.external_urls
            }))
        };
    } catch (e) {}

    // Priority 3: Pure public fallback (no auth needed for basic new releases)
    const publicProxies = [
        'https://api.allorigins.win/get?url=',
        'https://corsproxy.io/?',
        'https://thingproxy.freeboard.io/fetch/'
    ];
    for (const proxyBase of publicProxies) {
        try {
            const proxyUrl = `${proxyBase}${encodeURIComponent('https://api.spotify.com/v1/browse/new-releases?limit=20&country=US')}`;
            const res = await fetch(proxyUrl);
            const text = await res.text();
            const json = JSON.parse(text.startsWith('{"contents":') ? text.match(/{"contents":"(.+?)"}/)?.[1]?.replace(/\\"/g, '"') : text);
            return { albums: json.albums?.items || [] };
        } catch (e) {}
    }

    throw new Error('All methods failed. Try valid Spotify credentials or check internet.');
}

async function run() {
    // ... (keep the exact same run() body from previous version)
    // It calls fetchSpotifyData(id, secret) now instead of direct fetch
}
</script>


</body>
</html>
