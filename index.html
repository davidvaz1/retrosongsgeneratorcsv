<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 100 - Glassmorphism Edition</title>
    <style>
        :root {
            --accent: #1DB954;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --bg-color: #0b0e14;
        }

        body {
            background: var(--bg-color);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Mesh Background Orbs */
        .orb {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
            animation: float 20s infinite alternate ease-in-out;
        }
        .orb-1 { background: #1DB954; top: -10%; left: -10%; }
        .orb-2 { background: #7928ca; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 50px); }
        }

        .header {
            max-width: 550px;
            margin: 60px auto;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px;
            border-radius: 32px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 { font-size: 2.5rem; letter-spacing: -1.5px; margin-bottom: 25px; }

        .input-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }

        input {
            padding: 14px 18px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent); outline: none; background: rgba(0, 0, 0, 0.5); }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, background 0.3s;
        }
        button:hover { transform: scale(1.02); background: #1ed760; }
        button:active { transform: scale(0.98); }

        #status {
            display: block;
            margin-top: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 0.5px;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 50px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--glass-border);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-12px);
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 18px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card-info { flex-grow: 1; }
        .card strong { font-size: 1.1rem; display: block; margin-bottom: 4px; line-height: 1.3; }
        .card small { font-size: 0.9rem; color: #b3b3b3; font-weight: 500; }

        .btn {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="header">
        <h1>Global 100</h1>
        <div class="input-group">
            <input type="text" id="id" placeholder="Spotify Client ID">
            <input type="password" id="secret" placeholder="Spotify Client Secret">
        </div>
        <button onclick="run()">Fetch New Releases</button>
        <p id="status">Standby</p>
    </div>

    <div class="container" style="max-width: 1400px; margin: 0 auto;">
        <div id="grid"></div>
    </div>

    <script>
        async function run() {
            var id = document.getElementById('id').value.trim();
            var secret = document.getElementById('secret').value.trim();
            var status = document.getElementById('status');
            var grid = document.getElementById('grid');

            if (!id || !secret) {
                status.innerText = 'Please enter both Client ID and Client Secret.';
                return;
            }

            status.innerText = 'Syncing with Spotify API...';
            grid.innerHTML = '';

            try {
                var res = await fetch('/.netlify/functions/spotify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id: id, client_secret: secret })
                });

                var data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || 'Error ' + res.status);
                }

                if (!data.albums || data.albums.length === 0) {
                    status.innerText = 'No new releases found.';
                    return;
                }

                data.albums.forEach(function(album) {
                    var card = document.createElement('div');
                    card.className = 'card';
                    var imgUrl = (album.images && album.images[0] && album.images[0].url) ? album.images[0].url : '';
                    var artistName = (album.artists && album.artists[0] && album.artists[0].name) ? album.artists[0].name : 'Unknown';
                    var albumUrl = (album.external_urls && album.external_urls.spotify) ? album.external_urls.spotify : '#';
                    card.innerHTML =
                        '<img src="' + imgUrl + '" alt="' + album.name + '" loading="lazy">' +
                        '<div class="card-info">' +
                            '<strong>' + album.name + '</strong>' +
                            '<small>' + artistName + '</small>' +
                        '</div>' +
                        '<a href="' + albumUrl + '" target="_blank" rel="noopener noreferrer" class="btn">VIEW ALBUM</a>';
                    grid.appendChild(card);
                });

                status.innerText = 'Success: ' + data.albums.length + ' New Releases Loaded.';
            } catch (e) {
                status.innerText = 'Connection Failed: ' + e.message;
            }
        }
    </script>
</body>
</html>
