<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global 100 - Live Spotify</title>
    <style>
        * { box-sizing: border-box; }
        body {
            color: white;
            font-family: 'Inter', system-ui, sans-serif;
            margin: 0; padding: 20px;
            min-height: 100vh; overflow-x: hidden;
        }
        .orb { position: fixed; border-radius: 50%; z-index: 0; pointer-events: none; }
        @keyframes floatA {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(80px,40px) scale(1.07); }
            100% { transform: translate(40px,80px) scale(0.95); }
        }
        @keyframes floatB {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(-60px,-50px) scale(1.1); }
            100% { transform: translate(-90px,30px) scale(0.93); }
        }
        @keyframes floatC {
            0%   { transform: translate(0,0) scale(1); }
            50%  { transform: translate(50px,-70px) scale(1.05); }
            100% { transform: translate(-40px,-30px) scale(1.02); }
        }
        .header {
            max-width: 550px; margin: 60px auto; text-align: center;
            padding: 40px; border-radius: 32px;
            position: relative; overflow: hidden; z-index: 1;
        }
        h1 { font-size: 2.5rem; letter-spacing: -1.5px; margin: 0 0 25px; position: relative; z-index: 2; }
        #main-btn {
            width: 100%; padding: 16px;
            border: 1px solid rgba(255,255,255,0.25); border-radius: 50px;
            cursor: pointer; font-weight: 800; font-size: 1rem;
            text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            position: relative; z-index: 2;
        }
        #main-btn:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.2); }
        #status { margin-top: 20px; font-weight: 700; font-size: 0.9rem; position: relative; z-index: 2; }
        #grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
            gap: 30px; margin: 50px auto 0; max-width: 1400px;
            padding: 0 20px; position: relative; z-index: 1;
        }
        .card {
            border-radius: 24px; padding: 20px;
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.4s ease;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-12px); }
        .card img {
            width: 100%; height: 260px; object-fit: cover;
            border-radius: 16px; margin-bottom: 16px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.45);
            position: relative; z-index: 2; display: block;
        }
        .card-info { flex-grow: 1; position: relative; z-index: 2; }
        .card strong { font-size: 1.05rem; display: block; margin-bottom: 4px; line-height: 1.35; }
        .card small { font-size: 0.88rem; color: rgba(255,255,255,0.6); font-weight: 500; }
        .btn {
            display: block; color: white; text-align: center;
            padding: 12px; border-radius: 12px; text-decoration: none;
            font-weight: 700; margin-top: 16px; font-size: 0.85rem;
            transition: all 0.3s ease; position: relative; z-index: 2;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.25); }
    </style>
</head>
<body>
    <div class="orb" id="orb1"></div>
    <div class="orb" id="orb2"></div>
    <div class="orb" id="orb3"></div>
    <div class="header" id="header">
        <div id="hglow" style="position:absolute;inset:0;pointer-events:none;z-index:1;border-radius:32px;"></div>
        <h1>Global 100</h1>
        <button id="main-btn" onclick="fetchSpotify()">🎵 Fetch Latest Releases</button>
        <p id="status">Loading live Spotify data...</p>
    </div>
    <div id="grid"></div>

<script>
const R  = (a,b) => Math.random()*(b-a)+a;
const RI = (a,b) => Math.floor(R(a,b+1));
const pick = arr => arr[RI(0,arr.length-1)];
const hsl  = (h,s,l)   => `hsl(${h},${s}%,${l}%)`;
const hsla = (h,s,l,a) => `hsla(${h},${s}%,${l}%,${a})`;

function huePair() {
    const h = RI(0,359);
    return [h, (h + pick([60,90,120,150,180,210])) % 360];
}

let THEME = {};

function applyTheme() {
    const [h1,h2] = huePair();
    const [h3]    = huePair();
    const aS = RI(65,95), aL = RI(50,62);

    // Background — two dark hues bleeding together
    document.body.style.background =
        `linear-gradient(145deg, ${hsl(h1,RI(20,40),RI(4,9))}, ${hsl(h2,RI(15,35),RI(5,11))})`;

    // Orbs — high opacity so they're clearly visible
    [
        {id:'orb1', h:h1, top:`${RI(-15,5)}%`,   left:`${RI(-15,5)}%`,  anim:'floatA'},
        {id:'orb2', h:h2, bottom:`${RI(-15,5)}%`, right:`${RI(-15,5)}%`, anim:'floatB'},
        {id:'orb3', h:h3, top:`${RI(20,60)}%`,   left:`${RI(20,60)}%`,  anim:'floatC'},
    ].forEach((o,i) => {
        const el = document.getElementById(o.id);
        const sz = RI(400,650), blur = RI(90,140);
        const op = R(0.30,0.48).toFixed(2);
        const sat = RI(65,100), lit = RI(48,68), dur = RI(15,28);
        el.style.cssText = `
            position:fixed;border-radius:50%;z-index:0;pointer-events:none;
            width:${sz}px;height:${sz}px;
            background:${hsl(o.h,sat,lit)};
            filter:blur(${blur}px);opacity:${op};
            animation:${o.anim} ${dur}s ${-i*7}s infinite alternate ease-in-out;
        `;
        if(o.top)    el.style.top    = o.top;
        if(o.bottom) el.style.bottom = o.bottom;
        if(o.left)   el.style.left   = o.left;
        if(o.right)  el.style.right  = o.right;
    });

    // Header glass
    const hdr = document.getElementById('header');
    const hBlur = RI(24,48);
    const hA1 = R(0.10,0.22).toFixed(2), hA2 = R(0.02,0.06).toFixed(2);
    const hBorder = R(0.20,0.40).toFixed(2);
    hdr.style.background = `linear-gradient(${RI(110,200)}deg, rgba(255,255,255,${hA1}), rgba(255,255,255,${hA2}))`;
    hdr.style.backdropFilter = `blur(${hBlur}px)`;
    hdr.style.webkitBackdropFilter = `blur(${hBlur}px)`;
    hdr.style.border = `1.5px solid rgba(255,255,255,${hBorder})`;
    hdr.style.boxShadow = `inset 0 2px 10px rgba(255,255,255,0.12), 0 30px 80px -10px ${hsla(h1,aS,aL,0.40)}`;

    document.getElementById('hglow').style.background =
        `radial-gradient(circle at ${RI(20,80)}% ${RI(15,75)}%, ${hsla(h1,aS,aL,R(0.15,0.30).toFixed(2))}, transparent 60%)`;

    // Button
    const btn = document.getElementById('main-btn');
    const bH2 = (h1+RI(25,80))%360;
    btn.style.background = `linear-gradient(135deg, #1DB954, #16a34a)`;
btn.style.boxShadow  = `0 12px 35px rgba(29, 185, 84, 0.45)`;
btn.style.color      = `#000`;

    document.getElementById('status').style.color = hsl(h1,aS,aL);
    THEME = {h1,h2,h3,aS,aL};
}

function styleCard(card, i) {
    const {h1,h2,h3,aS,aL} = THEME;
    const hue  = (h1 + i*19 + RI(0,25)) % 360;
    const blur = RI(16,32);
    const a1   = R(0.10,0.20).toFixed(2), a2 = R(0.02,0.06).toFixed(2);
    const bord = R(0.18,0.35).toFixed(2);

    card.style.background = `linear-gradient(${RI(110,200)}deg, rgba(255,255,255,${a1}), rgba(255,255,255,${a2}))`;
    card.style.backdropFilter = `blur(${blur}px)`;
    card.style.webkitBackdropFilter = `blur(${blur}px)`;
    card.style.border    = `1.5px solid rgba(255,255,255,${bord})`;
    card.style.boxShadow = `inset 0 1.5px 5px rgba(255,255,255,0.10), 0 10px 40px rgba(0,0,0,0.25)`;

    let cg = card.querySelector('.cg');
    if (!cg) { cg = document.createElement('div'); cg.className='cg'; card.prepend(cg); }
    cg.style.cssText = `position:absolute;top:-50%;right:-50%;width:200%;height:200%;
        pointer-events:none;z-index:1;
        background:radial-gradient(circle, ${hsla(hue,RI(55,90),RI(45,68),R(0.06,0.14).toFixed(2))}, transparent 65%);`;

    const btn = card.querySelector('.btn');
    if (btn) {
        btn.style.background = `linear-gradient(135deg, ${hsla(h1,aS,aL,R(0.22,0.38).toFixed(2))}, ${hsla(h2,65,55,R(0.10,0.20).toFixed(2))})`;
        btn.style.border     = `1.5px solid rgba(255,255,255,${bord})`;
        btn.style.boxShadow  = `0 6px 20px ${hsla(h1,aS,aL,0.20)}`;
    }
}

async function fetchSpotify() {
    const status = document.getElementById('status');
    const grid   = document.getElementById('grid');
    status.textContent = '🔄 Loading Spotify releases...';
    grid.innerHTML = '';
    try {
        const res = await fetch('/api/spotify');
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        if (!data.albums?.length) throw new Error('No albums received from Spotify');

        data.albums.forEach((album, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            const imgUrl = album.images?.[0]?.url || '';
            const artist = album.artists?.[0]?.name || 'Unknown Artist';
            const url    = album.external_urls?.spotify || '#';
            card.innerHTML = `
                <img src="${imgUrl}" alt="${album.name}" loading="lazy"
                     onerror="this.outerHTML='<div style=&quot;display:flex;align-items:center;justify-content:center;height:260px;background:linear-gradient(135deg,#1DB954,#7928ca);border-radius:16px;font-size:3.5rem;margin-bottom:16px;position:relative;z-index:2;&quot;>🎵</div>'">
                <div class="card-info">
                    <strong>${album.name}</strong>
                    <small>${artist}</small>
                </div>
                <a href="${url}" target="_blank" class="btn">🎧 LISTEN ON SPOTIFY</a>`;
            grid.appendChild(card);
            styleCard(card, i);
        });

        status.innerHTML = `✅ <strong>${data.albums.length}</strong> New Releases Live!`;
        status.style.color = hsl(THEME.h1, THEME.aS, THEME.aL);
    } catch(err) {
        status.textContent = `❌ ${err.message}`;
    }
}

applyTheme();
fetchSpotify();
setInterval(fetchSpotify, 600_000);
</script>
</body>
</html>
