<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global 100 Explorer - Glassmorphism Edition</title>
    <style>
        :root {
            --accent: #1DB954;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --bg-base: #0b0e14;
            /* Glassmorphism variables */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(20px);
        }

        body.light {
            --accent: #16a34a;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --bg-base: #f4f7f9;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-blur: blur(25px);
        }

        body { 
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif; 
            margin: 0; padding: 40px 20px; 
            transition: 0.3s;
            position: relative;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* The Random Music Gradient Background Layer */
        #dynamic-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            transition: background 1s ease-in-out;
            opacity: 0.8;
        }
        body.light #dynamic-bg { opacity: 0.3; }

        /* The GLASSY UI Container */
        .glass-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 10;
        }

        h1 { margin-top: 0; font-weight: 800; font-size: 2.2rem; }

        .auth-inputs { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        
        input { 
            width: calc(100% - 24px); 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.3);
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        body.light input { background: rgba(255,255,255,0.7); }
        
        button { 
            background: var(--accent); color: white; border: none; 
            padding: 16px 35px; border-radius: 50px; 
            cursor: pointer; font-weight: 800; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(29, 185, 84, 0.3);
            transition: 0.2s;
        }
        button:hover { transform: scale(1.03); }
        button:disabled { background: #555; box-shadow: none; opacity: 0.7; }
        
        .mode-btn { background: #333; font-size: 0.7rem; padding: 8px 15px; margin-bottom: 15px; }

        #status { margin: 20px; font-weight: bold; font-size: 1.1rem; color: var(--accent); }

        /* Song Cards */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 25px; 
            max-width: 1300px; 
            margin: 40px auto; 
            position: relative; z-index: 10;
        }

        .card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur);
            border-radius: 15px; 
            overflow: hidden; 
            transition: transform 0.3s, box-shadow 0.3s;
            text-align: left;
        }
        .card:hover { transform: translateY(-8px); box-shadow: 0 12px 24px rgba(0,0,0,0.4); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-content { padding: 18px; }
        .song-title { font-weight: 800; font-size: 1rem; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { color: var(--accent); font-weight: 600; font-size: 0.85rem; }
    </style>
</head>
<body class="dark">

    <div id="dynamic-bg"></div>

    <div class="glass-container header">
        <button class="mode-btn" onclick="document.body.classList.toggle('light')">☀️/🌙 Toggle Mode</button>
        <h1>Global 100 Explorer</h1>
        
        <div class="auth-inputs">
            <input type="text" id="clientId" placeholder="Spotify Client ID">
            <input type="password" id="clientSecret" placeholder="Spotify Client Secret">
        </div>
        
        <button id="btn" onclick="runExplorer()">FETCH TOP 100 GLOBAL</button>
        <div id="status">Syncing with charts...</div>
    </div>

    <div id="grid"></div>

    <script>
        // FUNCTION 1: Generate a random music-themed gradient background
        function setRandomMusicBg() {
            const dynamicBg = document.getElementById('dynamic-bg');
            const palettes = [
                ['#ff0080', '#7928ca'], // Purple Haze
                ['#ff4d4d', '#ff9f4d', '#ffe04d'], // Sunset Beats
                ['#1DB954', '#121212', '#000000'], // Spotify Neon
                ['#00ffff', '#ff00ff', '#ff8000'], // Acid Techno
                ['#ff9a9e', '#fad0c4'], // Soft Melodies
                ['#a18cd1', '#fbc2eb'], // Lo-Fi Chill
                ['#4facfe', '#00f2fe'] // Electric Blues
            ];
            
            // Generate random angle (0-360 deg)
            const angle = Math.floor(Math.random() * 361);
            const palette = palettes[Math.floor(Math.random() * palettes.length)];
            const gradientString = `linear-gradient(${angle}deg, ${palette.join(', ')})`;
            
            // Optional: Add a subtle overlay texture
            const noise = 'url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADIAAAAyCAMAAAAp4uR6AAAABGdBTUEAALGPC/xhBQAAAAFzUkdCAK7OHOkAAAAYUExURf///8DAwKCgoAAAAAAAAAAAAAAAAAAAAOqOqS8AAAACdFJOUwBA5Mv7AAAAWUlEQVRYw+3TQRGAQAwDQW5oI4wKAt4AOf6Y6w0w4E7mI2/zD3b8g6H5P6TnP5id/8N6/4f1/g/t+Q9t+Q/p+T+k5/+Qnv9dev6L5r3W0gN3/Yf2XpL2At4AAAAASUVORK5CYII=)';
            
            dynamicBg.style.background = `${noise}, ${gradientString}`;
        }

        // Run this once when the page loads
        setRandomMusicBg();

        // FUNCTION 2: Secure Netlify Function-based search
        async function runExplorer() {
            const id = document.getElementById('clientId').value;
            const secret = document.getElementById('clientSecret').value;
            const status = document.getElementById('status');
            const grid = document.getElementById('grid');
            const btn = document.getElementById('btn');
            
            if (!id || !secret) return alert("Enter credentials!");

            btn.disabled = true;
            grid.innerHTML = "";
            status.style.color = "var(--accent)";
            let allTracks = [];

            try {
                // Loop 10 times to fetch 100 tracks (10 per request per 2026 limits)
                for (let i = 0; i < 10; i++) {
                    status.innerText = `Fetching Global Tracks: ${ (i+1)*10 }%`;
                    
                    const response = await fetch('/.netlify/functions/spotify', {
                        method: 'GET',
                        headers: {
                            'x-client-id': id,
                            'x-client-secret': secret,
                            'x-offset': i * 10
                        }
                    });

                    if (!response.ok) {
                        const err = await response.json();
                        throw new Error(err.message || "Failed to fetch charts");
                    }

                    const data = await response.json();
                    
                    // Defense check and combine the data
                    if (data?.tracks?.items) {
                        allTracks = [...allTracks, ...data.tracks.items];
                        render(allTracks); // Incremental Render
                    }
                }
                status.innerText = `${allTracks.length} Global Tracks Synchronized.`;
                // Generate a fresh music background after a successful load
                setRandomMusicBg();
            } catch (e) {
                status.style.color = "#ff5555";
                status.innerText = e.message;
            } finally {
                btn.disabled = false;
            }
        }

        // FUNCTION 3: Defensive Render Function
        function render(tracks) {
            const grid = document.getElementById('grid');
            grid.innerHTML = tracks.map(t => `
                <div class="card">
                    <img src="${t.album?.images?.[0]?.url || 'https://via.placeholder.com/220?text=No+Cover'}" loading="lazy">
                    <div class="card-content">
                        <div class="song-title" title="${t.name}">${t.name || 'Unknown Track'}</div>
                        <div class="artist-name">${t.artists?.[0]?.name || 'Unknown Artist'}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
